<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#53fc18">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KickBot">
    <title>Iniciar Sesión - Kick Chat Bot</title>
    <link rel="manifest" href="/static/manifest.json">
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/index.css">
    <style>
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100vw;
            padding: 1.5rem;
            position: relative;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            text-align: center;
        }

        .login-logo {
            margin-bottom: 2rem;
        }

        .login-logo i {
            font-size: 3.5rem;
            color: var(--color-kick);
            text-shadow: 0 0 20px var(--color-kick);
            animation: pulseGlow 3s infinite ease-in-out;
            margin-bottom: 1rem;
        }

        .login-logo h1 {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
        }

        .login-logo h1 span {
            color: var(--color-kick);
            font-weight: 300;
        }

        .login-logo p {
            font-size: 0.85rem;
            color: var(--color-text-sub);
        }

        .login-error-banner {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #fca5a5;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.88rem;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
            text-align: left;
        }

        .login-btn {
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="glow-bg"></div>
    <div class="login-wrapper">
        <div class="card login-card">
            <div class="login-logo">
                <i class="fa-solid fa-robot"></i>
                <h1>KICK <span>Timer Bot</span></h1>
                <p>Identifícate para acceder al panel</p>
            </div>

            <div id="error-banner" class="login-error-banner">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span id="error-message">Credenciales incorrectas.</span>
            </div>

            <form id="login-form" onsubmit="event.preventDefault();">
                <div class="form-group" style="text-align: left;">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Tu nombre de usuario" required autocomplete="username">
                </div>

                <div class="form-group" style="text-align: left;">
                    <label for="password">Contraseña</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" placeholder="Tu contraseña" required autocomplete="current-password">
                        <button type="button" id="btn-toggle-pass" class="btn-toggle-view"><i class="fa-solid fa-eye"></i></button>
                    </div>
                </div>

                <button type="submit" id="btn-submit" class="btn btn-primary btn-block login-btn">
                    <i class="fa-solid fa-right-to-bracket"></i> Entrar al Panel
                </button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("login-form");
            const inputUser = document.getElementById("username");
            const inputPass = document.getElementById("password");
            const togglePassBtn = document.getElementById("btn-toggle-pass");
            const errorBanner = document.getElementById("error-banner");
            const errorMessage = document.getElementById("error-message");
            const btnSubmit = document.getElementById("btn-submit");

            // Toggle contraseña
            togglePassBtn.addEventListener("click", () => {
                const type = inputPass.type === "password" ? "text" : "password";
                inputPass.type = type;
                const icon = togglePassBtn.querySelector("i");
                icon.className = type === "password" ? "fa-solid fa-eye" : "fa-solid fa-eye-slash";
            });

            form.addEventListener("submit", async () => {
                errorBanner.style.display = "none";
                btnSubmit.disabled = true;
                btnSubmit.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Cargando...';

                try {
                    const res = await fetch("/api/auth/login", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            username: inputUser.value.trim(),
                            password: inputPass.value
                        })
                    });

                    if (res.ok) {
                        window.location.href = "/";
                    } else {
                        const data = await res.json();
                        errorMessage.textContent = data.detail || "Error al iniciar sesión.";
                        errorBanner.style.display = "flex";
                        btnSubmit.disabled = false;
                        btnSubmit.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Entrar al Panel';
                    }
                } catch (err) {
                    errorMessage.textContent = "Error de conexión con el servidor.";
                    errorBanner.style.display = "flex";
                    btnSubmit.disabled = false;
                    btnSubmit.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Entrar al Panel';
                }
            });
        });
    </script>
</body>
</html>
